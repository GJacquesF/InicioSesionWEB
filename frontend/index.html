<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Gestor de Tareas</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ══════════════════════════════════════
       PANTALLA DE AUTENTICACIÓN (login/registro)
  ══════════════════════════════════════ -->
  <div id="auth-screen" class="auth-screen">

    <div class="auth-brand">
      <div class="brand-mark"></div>
      <span class="brand-name">TotoManagerTask</span>
    </div>

    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">Iniciar sesión</button>
        <button class="tab" id="tab-register" onclick="switchTab('register')">Crear cuenta</button>
      </div>

      <!-- Panel Login -->
      <div id="panel-login" class="auth-panel active">
        <p class="auth-subtitle">Bienvenido de vuelta</p>

        <div class="field">
          <label>Correo electrónico</label>
          <input type="email" id="login-email" placeholder="tu@correo.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <div id="login-error" class="msg-error hidden"></div>

        <button class="btn-primary" onclick="login()">
          <span>Entrar</span>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>

      <!-- Panel Registro -->
      <div id="panel-register" class="auth-panel">
        <p class="auth-subtitle">Crea tu cuenta gratis</p>

        <div class="field">
          <label>Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="tu@correo.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
        </div>

        <div id="register-error" class="msg-error hidden"></div>
        <div id="register-success" class="msg-success hidden"></div>

        <button class="btn-primary" onclick="register()">
          <span>Crear cuenta</span>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>

    </div>

    <!-- Decoración visual -->
    <div class="auth-deco" aria-hidden="true">
      <div class="deco-circle deco-1"></div>
      <div class="deco-circle deco-2"></div>
      <div class="deco-circle deco-3"></div>
    </div>

  </div>


  <!-- ══════════════════════════════════════
       DASHBOARD (gestor de tareas)
  ══════════════════════════════════════ -->
  <div id="dashboard-screen" class="dashboard-screen hidden">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark"></div>
        <span class="brand-name">TotoManagerTask</span>
      </div>

      <div class="sidebar-user">
        <div class="avatar" id="user-avatar">U</div>
        <div class="user-info">
          <span class="user-email" id="user-email-display">usuario@correo.com</span>
          <span class="user-role">Cuenta personal</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-item active">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          <span>Mis tareas</span>
        </div>
      </nav>

      <button class="btn-logout" onclick="logout()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Cerrar sesión
      </button>
    </aside>

    <!-- Main content -->
    <main class="main-content">

      <header class="main-header">
        <div>
          <h1 class="page-title">Mis tareas</h1>
          <p class="page-subtitle">Organiza tu día, una tarea a la vez</p>
        </div>
        <div class="header-stats">
          <div class="stat-chip">
            <span class="stat-num" id="task-count">0</span>
            <span class="stat-label">tareas</span>
          </div>
        </div>
      </header>

      <!-- Add task form -->
      <div class="add-task-card">
        <input
          type="text"
          id="new-task-input"
          class="task-input"
          placeholder="Escribe una nueva tarea..."
          maxlength="200"
          onkeydown="if(event.key==='Enter') addTask()"
        />
        <button class="btn-add" onclick="addTask()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Agregar
        </button>
      </div>

      <!-- Task list -->
      <div id="task-list" class="task-list">
        <!-- Tasks rendered by JS -->
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">📋</div>
        <p class="empty-title">Sin tareas por ahora</p>
        <p class="empty-desc">Agrega tu primera tarea para comenzar</p>
      </div>

      <!-- Loading state -->
      <div id="loading-state" class="loading-state">
        <div class="spinner"></div>
        <span>Cargando tareas...</span>
      </div>

    </main>
  </div>


  <!-- ══════════════════════════════════════
       MODAL DE EDICIÓN
  ══════════════════════════════════════ -->
  <div id="edit-modal" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal-card">
      <h3 class="modal-title">Editar tarea</h3>
      <input type="text" id="edit-input" class="task-input" placeholder="Nuevo título..." maxlength="200" />
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeEditModal()">Cancelar</button>
        <button class="btn-primary" onclick="saveEdit()">Guardar cambios</button>
      </div>
    </div>
  </div>


  <!-- Toast notification -->
  <div id="toast" class="toast hidden"></div>

  <script src="script.js"></script>
</body>
</html>
